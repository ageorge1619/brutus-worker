<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  #adamai-wrapper {
    position: fixed; top: 20px; right: 24px;
    display: flex; align-items: center; gap: 10px;
    z-index: 9999; cursor: pointer;
  }
  #adamai-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 500; color: #1a1a1a;
    background: #fff; padding: 6px 12px; border-radius: 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.12);
    white-space: nowrap; letter-spacing: -0.1px;
    transition: box-shadow 0.2s ease;
  }
  #adamai-label:hover { box-shadow: 0 4px 18px rgba(0,0,0,0.18); }
  #adamai-bubble {
    width: 68px; height: 68px; border-radius: 50%;
    overflow: hidden; flex-shrink: 0; background: #fff;
    box-shadow: 0 4px 20px rgba(0,0,0,0.28);
  }
  #adamai-bubble img {
    width: 100%; height: 100%;
    object-fit: contain;
    display: block;
  }
  #adamai-window {
    position: fixed; top: 104px; right: 24px;
    width: 380px; height: 540px; background: #fff;
    border-radius: 18px;
    box-shadow: 0 12px 48px rgba(0,0,0,0.16), 0 2px 8px rgba(0,0,0,0.08);
    display: flex; flex-direction: column; overflow: hidden;
    z-index: 9998; transform: scale(0.85) translateY(-20px);
    transform-origin: top right; opacity: 0; pointer-events: none;
    transition: transform 0.28s cubic-bezier(0.34,1.56,0.64,1), opacity 0.2s ease;
  }
  #adamai-window.open { transform: scale(1) translateY(0); opacity: 1; pointer-events: all; }
  .adamai-header { background: #1a1a1a; padding: 14px 16px; display: flex; align-items: center; gap: 11px; flex-shrink: 0; }
  .adamai-hd-avatar { width: 46px; height: 46px; border-radius: 50%; overflow: hidden; flex-shrink: 0; background: #fff; }
  .adamai-hd-avatar img { width: 100%; height: 100%; object-fit: contain; display: block; }
  .adamai-hd-name { font-size: 14px; font-weight: 600; color: #fff; font-family: 'DM Sans', sans-serif; }
  .adamai-hd-status { font-size: 12px; color: #888; display: flex; align-items: center; gap: 5px; margin-top: 2px; font-family: 'DM Sans', sans-serif; }
  .adamai-dot { width: 6px; height: 6px; border-radius: 50%; background: #5cb85c; }
  .adamai-messages { flex: 1; overflow-y: auto; padding: 14px 13px; display: flex; flex-direction: column; gap: 10px; background: #fafaf9; }
  .adamai-messages::-webkit-scrollbar { width: 4px; }
  .adamai-messages::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }
  .adamai-msg { display: flex; gap: 7px; max-width: 88%; }
  .adamai-msg.bot { align-self: flex-start; align-items: flex-end; }
  .adamai-msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .adamai-msg-av { width: 28px; height: 28px; border-radius: 50%; overflow: hidden; flex-shrink: 0; background: #fff; border: 1.5px solid #e0e0e0; }
  .adamai-msg-av img { width: 100%; height: 100%; object-fit: contain; display: block; }
  .adamai-msg.user .adamai-msg-av { display: none; }
  .adamai-bubble-text { padding: 9px 13px; border-radius: 16px; font-size: 14px; line-height: 1.55; font-family: 'DM Sans', sans-serif; }
  .adamai-msg.bot .adamai-bubble-text { background: #fff; border: 1px solid #ebebeb; border-bottom-left-radius: 4px; color: #1a1a1a; }
  .adamai-msg.user .adamai-bubble-text { background: #1a1a1a; color: #fff; border-bottom-right-radius: 4px; }
  .adamai-chips { display: flex; flex-wrap: wrap; gap: 6px; padding: 2px 0 2px 31px; }
  .adamai-chip { background: #fff; border: 1px solid #e0e0e0; border-radius: 20px; padding: 5px 11px; font-size: 12px; color: #444; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.15s; white-space: nowrap; }
  .adamai-chip:hover { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  .adamai-typing { align-self: flex-start; display: none; gap: 7px; align-items: flex-end; }
  .adamai-typing.on { display: flex; }
  .adamai-typing-bubble { padding: 10px 13px; background: #fff; border: 1px solid #ebebeb; border-radius: 16px; border-bottom-left-radius: 4px; display: flex; gap: 4px; }
  .adamai-td { width: 6px; height: 6px; border-radius: 50%; background: #bbb; animation: adamai-type 1.2s infinite; }
  .adamai-td:nth-child(2) { animation-delay: 0.2s; }
  .adamai-td:nth-child(3) { animation-delay: 0.4s; }
  @keyframes adamai-type { 0%,60%,100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-4px); opacity: 1; } }
  .adamai-input-area { padding: 11px 13px; border-top: 1px solid #f0f0f0; display: flex; gap: 8px; align-items: flex-end; background: #fff; flex-shrink: 0; }
  .adamai-input { flex: 1; border: 1px solid #e8e8e8; border-radius: 10px; padding: 9px 12px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: #1a1a1a; resize: none; outline: none; min-height: 36px; max-height: 36px; line-height: 36px; padding-top: 0; padding-bottom: 0; background: #fafaf9; transition: border-color 0.15s; }
  .adamai-input:focus { border-color: #e8e8e8; background: #fafaf9; }
  .adamai-input::placeholder { color: #999; }
  .adamai-send { width: 36px; height: 36px; border-radius: 10px; background: #1a1a1a; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.15s; }
  .adamai-send:hover { background: #333; }
  .adamai-powered {
    display: flex; align-items: center; justify-content: center;
    gap: 5px; padding: 7px 0 2px; background: #fff;
    font-size: 12px; color: #666; font-family: 'DM Sans', sans-serif;
    letter-spacing: 0.2px;
  }
  .adamai-disclaimer {
    text-align: center; font-size: 12px; color: #666;
    padding: 2px 14px 6px; background: #fff;
    font-family: 'DM Sans', sans-serif; line-height: 1.5;
    letter-spacing: 0.2px;
  }
  .adamai-footer { text-align: center; font-size: 10px; color: #ccc; padding: 5px 0 7px; background: #fff; letter-spacing: 0.3px; }
  @media (max-width: 768px) {
    #adamai-wrapper,
    #adamai-window {
      display: none !important;
    }
  }
</style>

  var _WORKER_URL = 'https://brutus-worker.adamgeorgedesign.workers.dev';

  // Inject the avatar image into all 4 image slots
  document.getElementById('adamai-bubble-img').src = _IMG;
  document.getElementById('adamai-hd-img').src = _IMG;
  document.getElementById('adamai-start-img').src = _IMG;
  document.getElementById('adamai-typing-img').src = _IMG;

  function adamaiToggle(){
    _open = !_open;
    document.getElementById('adamai-window').classList.toggle('open', _open);
    document.getElementById('adamai-label').innerHTML = _open ? '&#10005; Close' : '&#10024; Ask Brutus';
  }

  function adamaiAddMsg(text, role){
    var c = document.getElementById('adamai-msgs');
    var t = document.getElementById('adamai-typing');
    var d = document.createElement('div');
    d.className = 'adamai-msg ' + role;
    if(role === 'bot'){
      d.innerHTML = '<div class="adamai-msg-av"><img src="' + _IMG + '" style="width:100%;height:100%;object-fit:contain;border-radius:50%;background:#fff;"></div><div class="adamai-bubble-text">' + text + '</div>';
    } else {
      d.innerHTML = '<div class="adamai-msg-av"></div><div class="adamai-bubble-text">' + text + '</div>';
    }
    c.insertBefore(d, t);
    c.scrollTop = c.scrollHeight;
  }

  function adamaiSendMessage(messageText, displayText){
    // displayText shows in the chat bubble; messageText is sent to Brutus
    // For typed input they're the same; for chips they can differ.
    var chips = document.getElementById('adamai-chips');
    if(chips) chips.remove();
    adamaiAddMsg(displayText || messageText, 'user');
    document.getElementById('adamai-typing').classList.add('on');
    document.getElementById('adamai-msgs').scrollTop = 9999;
    fetch(_WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: messageText })
    })
    .then(function(res) { return res.json(); })
    .then(function(data) {
      document.getElementById('adamai-typing').classList.remove('on');
      if (data.reply) {
        adamaiAddMsg(data.reply, 'bot');
      } else {
        adamaiAddMsg("Sorry, something went wrong. Please email Adam directly at ageorge1619@gmail.com.", 'bot');
      }
    })
    .catch(function() {
      document.getElementById('adamai-typing').classList.remove('on');
      adamaiAddMsg("Sorry, I'm having trouble connecting right now. Please email Adam directly at ageorge1619@gmail.com.", 'bot');
    });
  }

  function adamaiSend(){
    var inp = document.getElementById('adamai-input');
    var txt = inp.value.trim();
    if(!txt) return;
    inp.value = ''; inp.style.height = 'auto';
    adamaiSendMessage(txt);
  }

  function adamaiChip(txt){
    adamaiSendMessage(txt);
  }

  // Belt-and-suspenders: stop any mousedown/click inside the window from bubbling
  // up to the document-level close handler. This is bulletproof — no DOM mutation
  // timing can affect this because we're catching events at the window boundary.
  document.getElementById('adamai-window').addEventListener('mousedown', function(e) {
    e.stopPropagation();
  });
  document.getElementById('adamai-window').addEventListener('click', function(e) {
    e.stopPropagation();
  });

  // Use mousedown (not click) so this fires BEFORE chip elements get removed from the DOM
  document.addEventListener('mousedown', function(e) {
    if (!_open) return;
    var wrapper = document.getElementById('adamai-wrapper');
    var window_ = document.getElementById('adamai-window');
    if (!wrapper.contains(e.target) && !window_.contains(e.target)) {
      _open = false;
      document.getElementById('adamai-window').classList.remove('open');
      document.getElementById('adamai-label').innerHTML = '&#10024; Ask Brutus';
    }
  });
</script>
